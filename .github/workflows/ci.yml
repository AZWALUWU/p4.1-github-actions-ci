name: CI Pipeline Lengkap

# Trigger: Jalankan pipeline setiap ada push atau pull request ke branch main
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Job 1: Linting untuk mengecek kualitas dan gaya penulisan kode
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Menggunakan caching otomatis bawaan setup-node untuk mempercepat npm install
      - name: Cache Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

  # Job 2: Unit Testing dengan Matrix Build (3 versi Node.js secara paralel)
  test:
    runs-on: ubuntu-latest
    needs: lint # Job test baru akan berjalan setelah Job lint sukses (Job Dependency)
    strategy:
      matrix:
        node-version: [18, 20, 22] # Menjalankan 3 environment berbeda sekaligus
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js Versi ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Cache Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests
        run: npm run test
