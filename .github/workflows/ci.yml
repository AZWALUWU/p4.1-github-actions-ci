name: CI Pipeline Lengkap

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Job 1: Linting
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

  # Job 2: Unit Testing dengan Matrix Build
  test:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js Versi ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Cache Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests
        run: npm run test

  # ==================== YANG BARU DI LANGKAH 3 ====================

  # Job 3: Security Scan (Berjalan paralel dengan test, setelah lint selesai)
  security:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Memeriksa celah keamanan pada dependensi yang kita gunakan
      # --audit-level=moderate artinya pipeline akan gagal jika ada celah tingkat moderate ke atas
      - name: Run Security Scan
        run: npm audit --audit-level=moderate

  # Job 4: Build & Upload Artifact (Hanya berjalan jika Test DAN Security sukses)
  build:
    runs-on: ubuntu-latest
    needs: [test, security]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm ci

      # Anggap ini proses build/bundling aplikasi (misal menghasilkan folder produksi)
      # Di project sederhana ini, kita buat folder 'dist' tiruan dan mengisinya dengan file utama
      # Berkaitan dengan: 'Artifact upload/download untuk berbagi hasil'
      - name: Build Application
        run: |
          mkdir dist
          cp index.js dist/
          echo "Build version: ${{ github.sha }}" > dist/build-info.txt

      # Mengunggah hasil folder 'dist' ke server GitHub sebagai Artifact
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-build
          path: dist/
          retention-days: 7 # Menyimpan file selama 7 hari sebelum dihapus otomatis
